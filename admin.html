<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Admin - Legion Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:linear-gradient(135deg,#0a0a0f,#1a0033);color:white;height:100vh;padding:20px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.btn{padding:8px 15px;border:none;border-radius:10px;background:linear-gradient(135deg,#7b00ff,#c000ff);color:white;cursor:pointer;font-weight:bold;margin:2px;}
.container{display:flex;gap:20px;}
.box{background:rgba(20,0,40,0.9);border-radius:20px;flex:1;display:flex;flex-direction:column;max-height:80vh;}
.box-header{background:linear-gradient(90deg,#6a00ff,#9d00ff);padding:10px;text-align:center;border-radius:20px 20px 0 0;}
.box-content{flex:1;overflow-y:auto;padding:10px;}
.item{background:#2a2a2a;padding:8px;border-radius:8px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#7b00ff;padding:12px 20px;border-radius:10px;display:none;animation:fade 0.5s;}
@keyframes fade{from{opacity:0;top:0;}to{opacity:1;top:20px;}}
input{width:100%;padding:8px;margin:5px 0;border-radius:8px;border:none;background:#1f1f2e;color:white;}
</style>
</head>
<body>

<div class="header">
<h2>Painel Admin - Legion Chat</h2>
<button class="btn" onclick="logout()">Sair</button>
</div>

<div class="header">
<input id="announcementInput" placeholder="Mensagem de aviso global">
<button class="btn" onclick="sendAnnouncement()">Enviar Aviso</button>
<button class="btn" onclick="toggleGlobalBlock()">Bloquear/Desbloquear Chat Global</button>
</div>

<div class="container">

<div class="box">
<div class="box-header">Mensagens</div>
<div id="messagesBox" class="box-content"></div>
</div>

<div class="box">
<div class="box-header">Usuários</div>
<div id="usersBox" class="box-content"></div>
</div>

</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDDj9IeS53XEEv07dULX2-OWbVvQyQbf6Y",
  authDomain: "legion-chat-d69be.firebaseapp.com",
  projectId: "legion-chat-d69be",
  storageBucket: "legion-chat-d69be.firebasestorage.app",
  messagingSenderId: "880449921734",
  appId: "1:880449921734:web:cdf622d2af44cb6ae8adc7",
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

let adminUID="";

function showToast(msg){toast.innerText=msg;toast.style.display="block";setTimeout(()=>toast.style.display="none",3000);}

function logout(){auth.signOut().then(()=>location.href="index.html");}

auth.onAuthStateChanged(async user=>{
if(!user){location.href="index.html"; return;}
let doc=await db.collection("users").doc(user.uid).get();
if(doc.data().role!=="admin"){alert("Acesso negado");logout(); return;}
adminUID=user.uid;
loadMessages();loadUsers();});

function loadMessages(){
db.collection("messages").orderBy("time").onSnapshot(s=>{
messagesBox.innerHTML="";
s.forEach(d=>{
let m=d.data();
let div=document.createElement("div");
div.className="item";
div.innerHTML=`<span>${m.user}: ${m.text}</span><button class="btn" onclick="deleteMessage('${d.id}')">Apagar</button>`;
messagesBox.appendChild(div);
});
});
}

function loadUsers(){
db.collection("users").onSnapshot(s=>{
usersBox.innerHTML="";
s.forEach(d=>{
let u=d.data();
let div=document.createElement("div");
div.className="item";
div.innerHTML=`
<span>${u.username} - ${u.ip||"Desconhecido"}</span>
<div>
<button class="btn" onclick="toggleUserBlock('${d.id}')">${u.blocked?"Desbloquear":"Bloquear"}</button>
<button class="btn" onclick="deleteUser('${d.id}')">Excluir</button>
</div>`;
usersBox.appendChild(div);
});
});
}

function deleteMessage(id){db.collection("messages").doc(id).delete();}

function deleteUser(uid){db.collection("users").doc(uid).delete();}

function toggleUserBlock(uid){
let userRef=db.collection("users").doc(uid);
userRef.get().then(doc=>{
let blocked=doc.data().blocked||false;
userRef.update({blocked:!blocked});
});
}

function toggleGlobalBlock(){
let ref=db.collection("settings").doc("chat");
ref.get().then(doc=>{
let blocked=doc.data()?.blocked||false;
ref.set({blocked:!blocked});
});
}

function sendAnnouncement(){
let text=announcementInput.value.trim();
if(!text)return;
db.collection("announcements").add({text});
announcementInput.value="";
showToast("Aviso enviado para todos ✅");
}
</script>

</body>
</html>
