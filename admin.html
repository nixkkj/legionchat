<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Admin</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:linear-gradient(135deg,#0a0a0f,#1a0033);
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

h2{
margin:15px;
}

.container{
width:1200px;
display:flex;
gap:20px;
}

.box{
flex:1;
background:rgba(20,0,40,0.9);
border-radius:20px;
display:flex;
flex-direction:column;
height:80vh;
}

.header{
background:linear-gradient(90deg,#6a00ff,#9d00ff);
padding:10px;
text-align:center;
border-radius:20px 20px 0 0;
font-weight:bold;
}

.content{
flex:1;
overflow-y:auto;
padding:10px;
}

.item{
background:rgba(30,0,50,0.6);
padding:10px;
margin-bottom:8px;
border-radius:10px;
font-size:14px;
}

button{
margin-top:5px;
margin-right:5px;
padding:6px 10px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#7b00ff,#c000ff);
color:white;
cursor:pointer;
font-size:12px;
}

.top-actions{
margin-bottom:10px;
}

</style>
</head>

<body>

<h2>Painel Administrativo</h2>

<div class="top-actions">
<button onclick="toggleChat()">Bloquear / Desbloquear Chat Global</button>
<button onclick="location.href='index.html'">Voltar</button>
</div>

<div class="container">

<div class="box">
<div class="header">Mensagens</div>
<div id="messages" class="content"></div>
</div>

  
<div class="box">
<div class="header">Usuários</div>
<div id="users" class="content"></div>
</div>
  

</div>

  <input id="globalMsg" placeholder="Aviso global">
<button onclick="sendGlobal()">Enviar Aviso</button>
  
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDDj9IeS53XEEv07dULX2-OWbVvQyQbf6Y",
  authDomain: "legion-chat-d69be.firebaseapp.com",
  projectId: "legion-chat-d69be",
  storageBucket: "legion-chat-d69be.firebasestorage.app",
  messagingSenderId: "880449921734",
  appId: "1:880449921734:web:cdf622d2af44cb6ae8adc7",
};


firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

auth.onAuthStateChanged(user=>{
if(!user){
alert("Você precisa estar logado");
location.href="index.html";
return;
}

db.collection("users").doc(user.uid).get().then(doc=>{
if(!doc.exists || doc.data().role!=="admin"){
alert("Acesso negado");
location.href="index.html";
}
});
});

function loadMessages(){
db.collection("messages").orderBy("time","desc")
.onSnapshot(s=>{
messages.innerHTML="";
s.forEach(doc=>{
let m=doc.data();

let div=document.createElement("div");
div.className="item";

div.innerHTML=`
<b>${m.user}</b>: ${m.text}
<br>
<button onclick="deleteMsg('${doc.id}')">Apagar</button>
`;

messages.appendChild(div);
});
});
}

function deleteMsg(id){
if(confirm("Apagar mensagem?")){
db.collection("messages").doc(id).delete();
}
}

  function sendGlobal(){
let text=document.getElementById("globalMsg").value;

db.collection("announcements").add({
text:text,
time:Date.now()
});
}
function loadUsers(){
db.collection("users").onSnapshot(s=>{
users.innerHTML="";

s.forEach(doc=>{
let u=doc.data();
let id=doc.id;

let div=document.createElement("div");
div.className="item";

div.innerHTML=`
<b>${u.username}</b><br>
IP: ${u.ip||"N/A"}<br>

<button onclick="banUser('${id}')">Banir</button>
<button onclick="deleteUser('${id}')">Excluir</button>
<button onclick="blockUser('${id}')">Bloquear Chat</button>
`;

users.appendChild(div);
});
});
}

function banUser(id){
if(confirm("Banir usuário?")){
db.collection("banned").doc(id).set({banned:true});
}
}

function deleteUser(id){
if(confirm("Excluir conta?")){
db.collection("users").doc(id).delete();
}
}

function blockUser(id){
if(confirm("Bloquear chat deste usuário?")){
db.collection("users").doc(id).update({blocked:true});
}
}

function toggleChat(){
db.collection("config").doc("chat").get().then(doc=>{
let state = doc.exists ? doc.data().blocked : false;

db.collection("config").doc("chat").set({
blocked: !state
});

alert(!state ? "Chat bloqueado" : "Chat liberado");
});
}

loadMessages();
loadUsers();
</script>

</body>
</html>
