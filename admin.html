<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Admin - Legion Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{height:100vh;background:linear-gradient(135deg,#0a0a0f,#1a0033);display:flex;justify-content:center;align-items:center;}
.container{width:90%;max-width:1200px;height:80vh;display:flex;gap:20px;}
.hidden{display:none;}
.panel{flex:1;background:rgba(20,0,40,0.8);border-radius:20px;overflow:hidden;display:flex;flex-direction:column;}
.panel-header{background:linear-gradient(90deg,#6a00ff,#9d00ff);padding:10px;text-align:center;color:white;}
.panel-content{flex:1;padding:10px;overflow-y:auto;}
.button{padding:8px 12px;border:none;border-radius:5px;background:linear-gradient(135deg,#7b00ff,#c000ff);color:white;cursor:pointer;margin:2px 0;display:block;width:100%;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#7b00ff;padding:12px 20px;border-radius:10px;display:none;animation:fade 0.5s;}
@keyframes fade{from{opacity:0;top:0;}to{opacity:1;top:20px;}}
.status{width:10px;height:10px;border-radius:50%;margin-right:5px;}
.status.online{background:green;}
.status.afk{background:orange;}
.status.offline{background:red;}
input{width:100%;padding:8px;border-radius:5px;border:none;margin-bottom:5px;}
</style>
</head>
<body>
<div class="container">
<div class="panel">
<div class="panel-header">Mensagens</div>
<div class="panel-content" id="messagesPanel"></div>
<input type="text" id="globalMessage" placeholder="Mensagem de aviso para todos">
<button id="sendGlobal" class="button">Enviar Aviso Global</button>
<button id="lockChatAll" class="button">Bloquear Chat para Todos</button>
</div>

<div class="panel">
<div class="panel-header">Usuários</div>
<div class="panel-content" id="usersAdminPanel"></div>
</div>

<div class="panel">
<div class="panel-header">Controle</div>
<div class="panel-content">
<button id="logoutAdmin" class="button">Sair</button>
</div>
</div>
</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDDj9IeS53XEEv07dULX2-OWbVvQyQbf6Y",
  authDomain: "legion-chat-d69be.firebaseapp.com",
  projectId: "legion-chat-d69be",
  storageBucket: "legion-chat-d69be.firebasestorage.app",
  messagingSenderId: "880449921734",
  appId: "1:880449921734:web:cdf622d2af44cb6ae8adc7",
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

const messagesPanel=document.getElementById("messagesPanel");
const usersAdminPanel=document.getElementById("usersAdminPanel");
const globalMessage=document.getElementById("globalMessage");
const sendGlobal=document.getElementById("sendGlobal");
const lockChatAll=document.getElementById("lockChatAll");
const logoutAdmin=document.getElementById("logoutAdmin");
const toast=document.getElementById("toast");

function showToast(msg){toast.innerText=msg;toast.style.display="block";setTimeout(()=>toast.style.display="none",3000);}

let currentUser=null;

auth.onAuthStateChanged(async user=>{
if(!user) window.location.href="index.html";
else{
currentUser=user;
const doc=await db.collection("users").doc(user.uid).get();
if(!doc.exists || doc.data().role!=="admin") window.location.href="index.html";
startMessages();
startUsers();
}
});

function startMessages(){
db.collection("messages").orderBy("time").onSnapshot(s=>{
messagesPanel.innerHTML="";
s.forEach(d=>{
const m=d.data();
const div=document.createElement("div");
div.innerHTML=`<b>${m.user}</b>: ${m.text} <button class="button" onclick="deleteMsg('${d.id}')">Apagar</button>`;
messagesPanel.appendChild(div);
messagesPanel.appendChild(document.createElement("hr"));
});
});
}

async function deleteMsg(id){
await db.collection("messages").doc(id).delete();
showToast("Mensagem apagada");
}

function startUsers(){
db.collection("users").onSnapshot(s=>{
usersAdminPanel.innerHTML="";
s.forEach(d=>{
const u=d.data();
const div=document.createElement("div");
const cls=u.status==="online"?"online":u.status==="afk"?"afk":"offline";
div.innerHTML=`<span class="status ${cls}"></span>${u.username} | IP: ${u.ip} <button class="button" onclick="blockUser('${d.id}')">Bloquear</button> <button class="button" onclick="deleteUser('${d.id}')">Excluir</button> <button class="button" onclick="lockChatUser('${d.id}')">Bloquear Chat</button>`;
usersAdminPanel.appendChild(div);
usersAdminPanel.appendChild(document.createElement("hr"));
});
});
}

async function blockUser(uid){
await db.collection("users").doc(uid).update({blocked:true});
showToast("Usuário bloqueado");
}

async function deleteUser(uid){
await db.collection("users").doc(uid).delete();
showToast("Usuário excluído");
}

async function lockChatUser(uid){
await db.collection("users").doc(uid).update({chatBlocked:true});
showToast("Chat do usuário bloqueado");
}

lockChatAll.onclick=async()=>{
const s=await db.collection("users").get();
s.forEach(d=>d.ref.update({chatBlocked:true}));
showToast("Chat bloqueado para todos");
};

sendGlobal.onclick=async()=>{
const text=globalMessage.value.trim();
if(!text) return;
await db.collection("globalAlerts").add({text,time:new Date()});
showToast("Aviso enviado para todos");
globalMessage.value="";
};

logoutAdmin.onclick=()=>auth.signOut();
</script>
</body>
</html>
