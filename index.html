<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Legion Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:linear-gradient(135deg,#0a0a0f,#1a0033);color:white;height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;}
.hidden{display:none;}
.toast{position:absolute;top:10px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-weight:bold;animation:fadeInOut 2.5s forwards;opacity:0;}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(-20px);}10%{opacity:1;transform:translateX(-50%) translateY(0);}90%{opacity:1;transform:translateX(-50%) translateY(0);}100%{opacity:0;transform:translateX(-50%) translateY(-20px);}}
.login-screen{width:95%;max-width:400px;background:rgba(20,0,40,0.85);border-radius:20px;padding:30px;backdrop-filter:blur(12px);box-shadow:0 0 50px rgba(140,0,255,0.5);}
.login-screen input{width:100%;padding:12px;margin:10px 0;border-radius:12px;border:none;background:#1f1f2e;color:white;font-size:14px;}
.login-screen button{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#7b00ff,#c000ff);color:white;margin-top:10px;font-weight:bold;cursor:pointer;transition:0.3s;}
.login-screen button:hover{opacity:0.85;}
.layout-container{width:95%;max-width:1300px;display:flex;gap:20px;height:80vh;justify-content:center;align-items:flex-start;}
.box{background:rgba(20,0,40,0.85);border-radius:20px;display:flex;flex-direction:column;backdrop-filter:blur(12px);box-shadow:0 0 50px rgba(140,0,255,0.2);}
.box-header{background:linear-gradient(90deg,#6a00ff,#9d00ff);padding:12px 15px;border-radius:20px 20px 0 0;font-weight:bold;text-align:center;}
.chat-box{flex:1;padding:15px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;max-height:70vh;}
.users-list,.logs-list{flex:1;padding:10px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;max-height:70vh;}
.chat-box::-webkit-scrollbar,.users-list::-webkit-scrollbar,.logs-list::-webkit-scrollbar{width:8px;}
.chat-box::-webkit-scrollbar-thumb,.users-list::-webkit-scrollbar-thumb,.logs-list::-webkit-scrollbar-thumb{background:linear-gradient(#7b00ff,#c000ff);border-radius:10px;}
.message{max-width:70%;padding:10px 14px;border-radius:15px;color:white;font-size:14px;word-wrap:break-word;animation:fadeIn 0.2s;}
.received{background:#2a2a2a;align-self:flex-start;border-radius:15px 15px 15px 5px;}
.sent{background:linear-gradient(135deg,#7b00ff,#c000ff);align-self:flex-end;border-radius:15px 15px 5px 15px;}
.chat-input{display:flex;padding:10px;background:rgba(10,0,20,0.95);}
.chat-input input{flex:1;padding:12px;border-radius:12px;border:none;background:#1f1f2e;color:white;font-size:14px;}
.chat-input button{margin-left:10px;padding:12px 20px;border:none;border-radius:12px;background:linear-gradient(135deg,#7b00ff,#c000ff);color:white;font-weight:bold;cursor:pointer;transition:0.3s;}
.chat-input button:hover{opacity:0.85;}
.user-item{margin:5px 0;padding:6px 10px;background:rgba(30,0,50,0.5);border-radius:10px;}
.log-item{margin:5px 0;padding:6px 10px;background:rgba(30,0,50,0.5);border-radius:10px;font-size:13px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
#chatBoxContainer{flex:3;display:flex;flex-direction:column;}
#usersContainer,#logsContainer{flex:1;display:flex;flex-direction:column;}
</style>
</head>
<body>

<div id="toastContainer"></div>

<div class="login-screen" id="loginScreen">
<h2>Legion Chat Login</h2>
<input type="text" id="loginUser" placeholder="Usuário">
<input type="password" id="loginPass" placeholder="Senha">
<button id="loginBtn">Login</button>
<button id="registerBtn">Criar Conta</button>
</div>

<div class="layout-container hidden" id="mainLayout">

<div class="box" id="chatBoxContainer">
<div class="box-header">Chat</div>
<div class="chat-box" id="chatBox"></div>
<div class="chat-input">
<input type="text" id="msgInput" placeholder="Digite uma mensagem...">
<button id="sendBtn">Enviar</button>
</div>
</div>

<div class="box" id="usersContainer">
<div class="box-header">Usuários</div>
<div class="users-list" id="usersList"></div>
</div>

<div class="box" id="logsContainer">
<div class="box-header">Update Logs</div>
<div class="logs-list" id="logsList"></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDDj9IeS53XEEv07dULX2-OWbVvQyQbf6Y",
  authDomain: "legion-chat-d69be.firebaseapp.com",
  projectId: "legion-chat-d69be",
  storageBucket: "legion-chat-d69be.firebasestorage.app",
  messagingSenderId: "880449921734",
  appId: "1:880449921734:web:cdf622d2af44cb6ae8adc7",
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore(),auth=firebase.auth();
let username="",role="";
function showToast(msg,color="#7b00ff"){const t=document.createElement("div");t.className="toast";t.style.background=color;t.innerText=msg;document.getElementById("toastContainer").appendChild(t);setTimeout(()=>t.remove(),2500);}
function showMainLayout(){document.getElementById("loginScreen").classList.add("hidden");document.getElementById("mainLayout").classList.remove("hidden");startChat();monitorUsers();loadUpdateLogs();}
document.getElementById("registerBtn").addEventListener("click",()=>{
const u=document.getElementById("loginUser").value.trim();
const p=document.getElementById("loginPass").value.trim();
if(!u||!p){showToast("Preencha todos os campos","red");return;}
const emailFake=u+"@test.com";
auth.createUserWithEmailAndPassword(emailFake,p)
.then(cred=>db.collection("users").doc(cred.user.uid).set({username:u,status:"online",role:"user"}))
.then(()=>showToast("Conta criada com sucesso ✅","#4caf50"))
.catch(e=>showToast(e.message,"red"));
});
document.getElementById("loginBtn").addEventListener("click",()=>{
const u=document.getElementById("loginUser").value.trim();
const p=document.getElementById("loginPass").value.trim();
if(!u||!p){showToast("Preencha todos os campos","red");return;}
const emailFake=u+"@test.com";
auth.signInWithEmailAndPassword(emailFake,p)
.then(cred=>db.collection("users").doc(cred.user.uid).get()
.then(doc=>{if(!doc.exists){showToast("Usuário ou senha incorretos","red");return;}username=doc.data().username;role=doc.data().role;db.collection("users").doc(cred.user.uid).update({status:"online"});showToast("Login bem-sucedido! ✅","#4caf50");setTimeout(showMainLayout,800);})).catch(()=>showToast("Usuário ou senha incorretos","red"));
});
document.getElementById("sendBtn").addEventListener("click",sendMessage);
document.getElementById("msgInput").addEventListener("keypress",e=>{if(e.key==="Enter")sendMessage();});
function sendMessage(){const text=document.getElementById("msgInput").value.trim();if(!text)return;const msgObj={user:username,data:text,timestamp:firebase.firestore.FieldValue.serverTimestamp(),displayTime:new Date().toLocaleTimeString()};db.collection("rooms").doc("general").collection("messages").add(msgObj);document.getElementById("msgInput").value="";}
function startChat(){const chatBox=document.getElementById("chatBox");db.collection("rooms").doc("general").collection("messages").orderBy("timestamp").onSnapshot(snapshot=>{chatBox.innerHTML="";snapshot.docs.forEach(doc=>{const msg=doc.data();const div=document.createElement("div");div.className="message "+(msg.user===username?"sent":"received");div.innerText=`[${msg.displayTime||""}] ${msg.user}: ${msg.data}`;chatBox.appendChild(div);});chatBox.scrollTop=chatBox.scrollHeight;});}
function monitorUsers(){const usersList=document.getElementById("usersList");db.collection("users").onSnapshot(snapshot=>{usersList.innerHTML="";snapshot.docs.forEach(doc=>{const u=doc.data();const div=document.createElement("div");div.className="user-item";div.innerText=u.username+" - "+u.status;usersList.appendChild(div);});});window.addEventListener("beforeunload",()=>{if(auth.currentUser)db.collection("users").doc(auth.currentUser.uid).update({status:"afk"});});}
function loadUpdateLogs(){const logsList=document.getElementById("logsList");db.collection("updateLogs").orderBy("timestamp","desc").onSnapshot(snapshot=>{logsList.innerHTML="";snapshot.docs.forEach(doc=>{const log=doc.data();const div=document.createElement("div");div.className="log-item";div.innerHTML=`<strong>Patch ${log.date}</strong><br>${log.changes.map(c=>`[-] ${c}`).join("<br>")}`;logsList.appendChild(div);});});}
</script>
</body>
</html>
