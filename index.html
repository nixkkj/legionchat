<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Legion Chat</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{
background:linear-gradient(135deg,#0a0a0f,#1a0033);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.hidden{display:none}

.login{
width:350px;
background:rgba(20,0,40,0.9);
padding:30px;
border-radius:20px;
}

.login input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#1f1f2e;
color:white;
}

.btn{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#7b00ff,#c000ff);
color:white;
cursor:pointer;
margin-top:10px;
font-weight:bold;
}

.main{
display:flex;
gap:20px;
width:1100px;
height:80vh;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
background:rgba(20,0,40,0.9);
border-radius:20px;
}

.header{
background:linear-gradient(90deg,#6a00ff,#9d00ff);
padding:10px;
text-align:center;
border-radius:20px 20px 0 0;
display:flex;
justify-content:space-between;
align-items:center;
}

.chat-box{
flex:1;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
overflow-y:auto;
}

.message{
max-width:65%;
padding:10px;
border-radius:15px;
font-size:14px;
word-break:break-word;
}

.sent{
align-self:flex-end;
background:linear-gradient(135deg,#7b00ff,#c000ff);
}

.received{
align-self:flex-start;
background:#2a2a2a;
}

.input{
display:flex;
padding:10px;
}

.input input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#1f1f2e;
color:white;
}

.side{
width:250px;
display:flex;
flex-direction:column;
gap:20px;
}

.box{
background:rgba(20,0,40,0.9);
border-radius:20px;
display:flex;
flex-direction:column;
height:calc(50% - 10px);
}

.box-header{
background:linear-gradient(90deg,#6a00ff,#9d00ff);
padding:10px;
text-align:center;
border-radius:20px 20px 0 0;
}

.box-content{
flex:1;
overflow-y:auto;
padding:10px;
}

.item{
background:rgba(30,0,50,0.5);
padding:8px;
border-radius:10px;
margin-bottom:5px;
font-size:13px;
}
</style>
</head>

<body>

<div id="loginScreen" class="login">
<h2>Login</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button class="btn" onclick="login()">Entrar</button>
<button class="btn" onclick="register()">Criar Conta</button>
</div>

<div id="app" class="main hidden">

<div class="chat">
<div class="header">
<span id="username">Chat</span>
<div style="display:flex;gap:10px;">
<button class="btn" style="width:auto;padding:6px 10px;" onclick="goAdmin()">Admin</button>
<button class="btn" style="width:auto;padding:6px 10px;" onclick="logout()">Sair</button>
</div>
</div>

<div id="chatBox" class="chat-box"></div>

<div class="input">
<input id="msg" placeholder="Digite uma mensagem...">
<button class="btn" style="width:auto" onclick="send()">Enviar</button>
</div>
</div>

<div class="side">

<div class="box">
<div class="box-header">Usuários</div>
<div id="usersList" class="box-content"></div>
</div>

<div class="box">
<div class="box-header">Update Logs</div>
<div id="logsList" class="box-content"></div>
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDDj9IeS53XEEv07dULX2-OWbVvQyQbf6Y",
  authDomain: "legion-chat-d69be.firebaseapp.com",
  projectId: "legion-chat-d69be",
  storageBucket: "legion-chat-d69be.firebasestorage.app",
  messagingSenderId: "880449921734",
  appId: "1:880449921734:web:cdf622d2af44cb6ae8adc7",
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

let username="";

function showApp(){
document.getElementById("loginScreen").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
document.getElementById("username").innerText=username;
loadChat();
loadUsers();
loadLogs();
}

function register(){
let u=user.value.trim();
let p=pass.value.trim();
if(!u||!p)return alert("Preencha tudo");

auth.createUserWithEmailAndPassword(u+"@x.com",p)
.then(r=>{
db.collection("users").doc(r.user.uid).set({username:u,status:"online"});
alert("Conta criada");
});
}

function login(){
let u=user.value.trim();
let p=pass.value.trim();

auth.signInWithEmailAndPassword(u+"@x.com",p)
.then(r=>{
db.collection("users").doc(r.user.uid).get().then(doc=>{
username=doc.data().username;
showApp();
});
});
}

function logout(){
auth.signOut().then(()=>location.reload());
}

function goAdmin(){
window.location="admin.html";
}

function send(){
let text=msg.value.trim();
if(!text)return;

db.collection("messages").add({
user:username,
text:text,
time:Date.now()
});

msg.value="";
}

function loadChat(){
db.collection("messages").orderBy("time")
.onSnapshot(s=>{
chatBox.innerHTML="";
s.forEach(d=>{
let m=d.data();
let div=document.createElement("div");
div.className="message "+(m.user==username?"sent":"received");
div.innerText=m.user+": "+m.text;
chatBox.appendChild(div);
});
chatBox.scrollTop=chatBox.scrollHeight;
});
}

function loadUsers(){
db.collection("users").onSnapshot(s=>{
usersList.innerHTML="";
s.forEach(d=>{
let u=d.data();
let div=document.createElement("div");
div.className="item";
div.innerText=u.username+" - "+u.status;
usersList.appendChild(div);
});
});
}

function loadLogs(){
db.collection("updateLogs").onSnapshot(s=>{
logsList.innerHTML="";
s.forEach(d=>{
let l=d.data();
let div=document.createElement("div");
div.className="item";
div.innerHTML="<b>Patch "+l.date+"</b><br>"+l.changes.map(c=>"[-] "+c).join("<br>");
logsList.appendChild(div);
});
});
}
</script>

</body>
</html>
