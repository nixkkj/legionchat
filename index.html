<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Legion Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{height:100vh;background:linear-gradient(135deg,#0a0a0f,#1a0033);display:flex;justify-content:center;align-items:center;}
.hidden{display:none;}
.container{width:90%;max-width:1200px;height:80vh;display:flex;gap:20px;}
.chat-container{flex:3;background:rgba(20,0,40,0.8);border-radius:20px;backdrop-filter:blur(12px);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 40px rgba(140,0,255,0.4);}
.chat-header{padding:15px;text-align:center;color:white;background:linear-gradient(90deg,#6a00ff,#9d00ff);}
.chat-box{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;}
.message{max-width:70%;padding:10px 14px;border-radius:15px;color:white;font-size:14px;animation:fadeIn 0.2s ease;}
.sent{background:linear-gradient(135deg,#7b00ff,#c000ff);align-self:flex-end;}
.received{background:#2a2a2a;align-self:flex-start;}
.chat-input{display:flex;padding:15px;background:rgba(10,0,20,0.9);}
.chat-input input{flex:1;padding:10px;border-radius:10px;border:none;background:#1f1f2e;color:white;}
.chat-input button{margin-left:10px;padding:10px 20px;border:none;border-radius:10px;background:linear-gradient(135deg,#7b00ff,#c000ff);color:white;cursor:pointer;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.side-panel{flex:1;display:flex;flex-direction:column;gap:20px;}
.side-box{background:rgba(20,0,40,0.8);border-radius:20px;overflow:hidden;display:flex;flex-direction:column;}
.side-header{background:linear-gradient(90deg,#6a00ff,#9d00ff);padding:10px;text-align:center;}
.side-content{flex:1;padding:10px;overflow-y:auto;}
.button{padding:8px 12px;border:none;border-radius:5px;background:linear-gradient(135deg,#7b00ff,#c000ff);color:white;cursor:pointer;margin:2px 0;display:block;width:100%;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#7b00ff;padding:12px 20px;border-radius:10px;display:none;animation:fade 0.5s;}
@keyframes fade{from{opacity:0;top:0;}to{opacity:1;top:20px;}}
.status{width:10px;height:10px;border-radius:50%;margin-right:5px;}
.status.online{background:green;}
.status.afk{background:orange;}
.status.offline{background:red;}
</style>
</head>
<body>

<div id="loginScreen" class="container">
<div class="side-box" style="flex:1;padding:20px;">
<h2>Login</h2>
<input type="text" id="loginUser" placeholder="Usuário" style="width:100%;margin-bottom:5px;padding:8px;border-radius:5px;border:none;">
<input type="password" id="loginPass" placeholder="Senha" style="width:100%;margin-bottom:5px;padding:8px;border-radius:5px;border:none;">
<button id="loginBtn" class="button">Login</button>
<button id="registerBtn" class="button">Registrar</button>
</div>
</div>

<div id="chatScreen" class="container hidden">
<div class="chat-container">
<div class="chat-header" id="header">Chat</div>
<div class="chat-box" id="chatBox"></div>
<div class="chat-input">
<input type="text" id="msgInput" placeholder="Digite uma mensagem...">
<button id="sendBtn">Enviar</button>
</div>
</div>

<div class="side-panel">
<div class="side-box">
<div class="side-header">Usuários</div>
<div class="side-content" id="usersPanel"></div>
</div>
<div class="side-box">
<div class="side-header">Update Logs</div>
<div class="side-content" id="updatesPanel"></div>
</div>
<div class="side-box">
<div class="side-header">Legion - Discord</div>
<div class="side-content">
<a href="https://discord.gg/jhFuJYhvHz" target="_blank" style="color:white;text-decoration:none;font-weight:bold;">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" alt="Discord" style="width:20px;vertical-align:middle;margin-right:5px;"> Entrar no Discord
</a>
<button id="adminBtn" class="button">Painel Admin</button>
<button id="logoutBtn" class="button">Sair</button>
</div>
</div>
</div>
</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDDj9IeS53XEEv07dULX2-OWbVvQyQbf6Y",
  authDomain: "legion-chat-d69be.firebaseapp.com",
  projectId: "legion-chat-d69be",
  storageBucket: "legion-chat-d69be.firebasestorage.app",
  messagingSenderId: "880449921734",
  appId: "1:880449921734:web:cdf622d2af44cb6ae8adc7",
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

const loginScreen=document.getElementById("loginScreen");
const chatScreen=document.getElementById("chatScreen");
const header=document.getElementById("header");
const chatBox=document.getElementById("chatBox");
const msgInput=document.getElementById("msgInput");
const sendBtn=document.getElementById("sendBtn");
const usersPanel=document.getElementById("usersPanel");
const updatesPanel=document.getElementById("updatesPanel");
const adminBtn=document.getElementById("adminBtn");
const logoutBtn=document.getElementById("logoutBtn");
const toast=document.getElementById("toast");

let username=null;
let currentUser=null;

function showToast(msg){toast.innerText=msg;toast.style.display="block";setTimeout(()=>toast.style.display="none",3000);}

auth.onAuthStateChanged(async user=>{
if(user){
currentUser=user;
const doc=await db.collection("users").doc(user.uid).get();
username=doc.exists?doc.data().username:user.email;
loginScreen.classList.add("hidden");
chatScreen.classList.remove("hidden");
header.innerText="Chat - "+username;
startChat();
startUsers();
loadUpdates();
}else{
loginScreen.classList.remove("hidden");
chatScreen.classList.add("hidden");
}
});

document.getElementById("loginBtn").onclick=async()=>{
const u=document.getElementById("loginUser").value.trim();
const p=document.getElementById("loginPass").value.trim();
if(!u||!p){showToast("Preencha todos os campos");return;}
try{
const snap=await db.collection("users").where("username","==",u).get();
if(snap.empty){showToast("Usuário não encontrado");return;}
const doc=snap.docs[0];
await auth.signInWithEmailAndPassword(doc.data().email,p);
}catch(e){showToast("Usuário ou senha incorretos");}
};

document.getElementById("registerBtn").onclick=async()=>{
const u=document.getElementById("loginUser").value.trim();
const p=document.getElementById("loginPass").value.trim();
if(!u||!p){showToast("Preencha todos os campos");return;}
const snap=await db.collection("users").where("username","==",u).get();
if(!snap.empty){showToast("Usuário já existe");return;}
const email=u+"@legionchat.com";
try{
const res=await auth.createUserWithEmailAndPassword(email,p);
await db.collection("users").doc(res.user.uid).set({username:u,status:"online",role:"user",ip:"",blocked:false});
showToast("Conta criada com sucesso ✅");
}catch(e){showToast("Erro ao criar conta");}
};

sendBtn.onclick=async()=>{
const text=msgInput.value.trim();
if(!text) return;
await db.collection("messages").add({user:username,text,time:new Date()});
msgInput.value="";
};

logoutBtn.onclick=()=>auth.signOut();
adminBtn.onclick=()=>window.location.href="admin.html";

function startChat(){
db.collection("messages").orderBy("time").onSnapshot(s=>{
chatBox.innerHTML="";
s.forEach(d=>{
const m=d.data();
const div=document.createElement("div");
div.classList.add("message",m.user===username?"sent":"received");
div.innerText=m.user+": "+m.text;
chatBox.appendChild(div);
chatBox.scrollTop=chatBox.scrollHeight;
});
});
}

function startUsers(){
db.collection("users").onSnapshot(s=>{
usersPanel.innerHTML="";
s.forEach(d=>{
const u=d.data();
const span=document.createElement("span");
const cls=u.status==="online"?"online":u.status==="afk"?"afk":"offline";
span.innerHTML=`<span class="status ${cls}"></span>${u.username}`;
usersPanel.appendChild(span);
usersPanel.appendChild(document.createElement("br"));
});
});
}

function loadUpdates(){
updatesPanel.innerHTML="";
db.collection("updates").orderBy("time","desc").get().then(s=>{
s.forEach(d=>{
const u=d.data();
const div=document.createElement("div");
div.innerHTML=`<b>Patch ${new Date(u.time.toDate()).toLocaleDateString()}</b><br>${u.changes.map(c=>"- "+c).join("<br>")}`;
updatesPanel.appendChild(div);
updatesPanel.appendChild(document.createElement("hr"));
});
});
}
</script>
</body>
</html>
