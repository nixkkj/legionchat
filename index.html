<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Legion Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{height:100vh;background:linear-gradient(135deg,#0a0a0f,#1a0033);display:flex;justify-content:center;align-items:center;}
.hidden{display:none;}
.chat-container{width:90%;max-width:1000px;height:80vh;background:rgba(20,0,40,0.8);border-radius:20px;backdrop-filter:blur(12px);box-shadow:0 0 40px rgba(140,0,255,0.4);display:flex;flex-direction:row;overflow:hidden;}
.login-container{width:350px;background:rgba(0,0,0,0.8);padding:30px;border-radius:15px;text-align:center;color:white;}
.login-container input{width:100%;padding:10px;margin:10px 0;border-radius:8px;border:none;background:#1f1f2e;color:white;}
.login-container button{padding:10px 20px;margin-top:10px;border:none;border-radius:8px;background:linear-gradient(135deg,#7b00ff,#c000ff);color:white;cursor:pointer;}
.toast{position:absolute;top:10px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;color:white;font-weight:bold;animation:fadeInOut 2.5s forwards;opacity:0;}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(-20px);}10%{opacity:1;transform:translateX(-50%) translateY(0);}90%{opacity:1;transform:translateX(-50%) translateY(0);}100%{opacity:0;transform:translateX(-50%) translateY(-20px);}}
.side-panel{width:200px;background:rgba(0,0,0,0.3);color:white;padding:10px;display:flex;flex-direction:column;}
.chat-wrapper{flex:1;display:flex;flex-direction:column;}
.chat-header{padding:15px;text-align:center;color:#fff;background:linear-gradient(90deg,#6a00ff,#9d00ff);display:flex;justify-content:space-between;align-items:center;}
.chat-box{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
.chat-box::-webkit-scrollbar{width:8px;}
.chat-box::-webkit-scrollbar-track{background:transparent;}
.chat-box::-webkit-scrollbar-thumb{background:linear-gradient(#7b00ff,#c000ff);border-radius:10px;}
.message{max-width:70%;padding:10px 14px;border-radius:15px;color:white;font-size:14px;animation:fadeIn 0.2s ease;}
.received{background:#2a2a2a;align-self:flex-start;}
.sent{background:linear-gradient(135deg,#7b00ff,#c000ff);align-self:flex-end;}
.chat-input{display:flex;padding:15px;background:rgba(10,0,20,0.9);}
.chat-input input{flex:1;padding:10px;border-radius:10px;border:none;background:#1f1f2e;color:white;}
.chat-input button{margin-left:10px;padding:10px 20px;border:none;border-radius:10px;background:linear-gradient(135deg,#7b00ff,#c000ff);color:white;cursor:pointer;}
.status-label{font-size:12px;color:#aaa;margin-bottom:5px;}
.user-item{padding:5px;border-radius:5px;margin:2px 0;background:rgba(255,255,255,0.1);display:flex;justify-content:space-between;}
.afk{opacity:0.5;}
.logout-btn{padding:5px 10px;border:none;border-radius:5px;background:#c00000;color:white;cursor:pointer;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div id="toastContainer"></div>

<div id="loginScreen" class="login-container">
  <h2>Login</h2>
  <input type="text" id="loginUser" placeholder="Usuário">
  <input type="password" id="loginPass" placeholder="Senha">
  <button id="loginBtn">Login</button>
  <p>ou <span id="showRegister" style="cursor:pointer;text-decoration:underline;">Registrar</span></p>
</div>

<div id="registerScreen" class="login-container hidden">
  <h2>Registrar</h2>
  <input type="text" id="regUser" placeholder="Usuário">
  <input type="password" id="regPass" placeholder="Senha">
  <button id="registerBtn">Criar Conta</button>
  <p>ou <span id="showLogin" style="cursor:pointer;text-decoration:underline;">Login</span></p>
</div>

<div id="chatScreen" class="chat-container hidden">
  <div class="side-panel" id="usersPanel">
    <h4>Usuários</h4>
    <div id="userList"></div>
  </div>
  <div class="chat-wrapper">
    <div class="chat-header" id="header">
      <span>Chat</span>
      <button class="logout-btn" id="logoutBtn">Sair</button>
    </div>
    <div class="status-label" id="typingStatus"></div>
    <div class="chat-box" id="chatBox"></div>
    <div class="chat-input">
      <input type="text" id="msgInput" placeholder="Digite uma mensagem...">
      <button id="sendBtn">Enviar</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// CONFIGURE SEU FIREBASE AQUI
const firebaseConfig = {
  apiKey: "AIzaSyDDj9IeS53XEEv07dULX2-OWbVvQyQbf6Y",
  authDomain: "legion-chat-d69be.firebaseapp.com",
  projectId: "legion-chat-d69be",
  storageBucket: "legion-chat-d69be.firebasestorage.app",
  messagingSenderId: "880449921734",
  appId: "1:880449921734:web:cdf622d2af44cb6ae8adc7",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let username = "";
let room = "general";

function showToast(msg,color="#7b00ff"){
  const t=document.createElement("div");
  t.className="toast"; t.style.background=color; t.innerText=msg;
  document.getElementById("toastContainer").appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

const loginScreen=document.getElementById("loginScreen");
const registerScreen=document.getElementById("registerScreen");
const chatScreen=document.getElementById("chatScreen");
const header=document.getElementById("header");
const chatBox=document.getElementById("chatBox");
const msgInput=document.getElementById("msgInput");
const userList=document.getElementById("userList");
const typingStatus=document.getElementById("typingStatus");

document.getElementById("showRegister").addEventListener("click",()=>{
  loginScreen.classList.add("hidden");
  registerScreen.classList.remove("hidden");
});
document.getElementById("showLogin").addEventListener("click",()=>{
  registerScreen.classList.add("hidden");
  loginScreen.classList.remove("hidden");
});

document.getElementById("registerBtn").addEventListener("click",()=>{
  const u=document.getElementById("regUser").value.trim();
  const p=document.getElementById("regPass").value.trim();
  if(!u||!p){showToast("Preencha todos os campos","red");return;}
  db.collection("users").where("username","==",u).get().then(snap=>{
    if(!snap.empty){showToast("Usuário já existe","red"); return;}
    db.collection("users").add({username:u,password:p,status:"online"})
      .then(()=>{showToast("Registro bem-sucedido! ✅","#4caf50");setTimeout(()=>{registerScreen.classList.add("hidden"); loginScreen.classList.remove("hidden");},800);})
      .catch(e=>showToast("Erro: "+e.message,"red"));
  });
});

document.getElementById("loginBtn").addEventListener("click",loginUser);
document.getElementById("sendBtn").addEventListener("click",sendMessage);
msgInput.addEventListener("keypress",e=>{if(e.key==="Enter") sendMessage();});
document.getElementById("logoutBtn").addEventListener("click",logoutUser);

function loginUser(){
  const u=document.getElementById("loginUser").value.trim();
  const p=document.getElementById("loginPass").value.trim();
  if(!u||!p){showToast("Preencha todos os campos","red");return;}
  db.collection("users").where("username","==",u).where("password","==",p).get()
    .then(snap=>{
      if(snap.empty){showToast("Usuário ou senha incorretos","red");return;}
      username=u; showToast("Login bem-sucedido! ✅","#4caf50");
      db.collection("users").doc(snap.docs[0].id).update({status:"online"});
      loginScreen.classList.add("hidden"); chatScreen.classList.remove("hidden");
      header.querySelector("span").innerText="Chat - "+username;
      startChat(); monitorUsers();
    }).catch(e=>showToast("Erro ao logar: "+e.message,"red"));
}

function logoutUser(){
  if(!username) return;
  db.collection("users").where("username","==",username).get().then(snap=>{
    if(!snap.empty) db.collection("users").doc(snap.docs[0].id).update({status:"offline"});
    username="";
    chatScreen.classList.add("hidden");
    loginScreen.classList.remove("hidden");
    chatBox.innerHTML="";
    userList.innerHTML="";
  });
}

function sendMessage(){
  const text=msgInput.value.trim();
  if(!text) return;
  const now=new Date();
  const time=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
  db.collection("rooms").doc(room).collection("messages").add({user:username,data:text,time:time})
    .then(()=>{msgInput.value="";})
    .catch(e=>showToast("Erro: "+e.message,"red"));
}

function startChat(){
  db.collection("rooms").doc(room).collection("messages").orderBy("time")
    .onSnapshot(snapshot=>{
      chatBox.innerHTML="";
      snapshot.docs.forEach(doc=>{
        const msg=doc.data();
        const div=document.createElement("div");
        div.className="message "+(msg.user===username?"sent":"received");
        div.innerText=`[${msg.time}] ${msg.user}: ${msg.data}`;
        chatBox.appendChild(div);
      });
      chatBox.scrollTop=chatBox.scrollHeight;
    });
}

function monitorUsers(){
  db.collection("users").onSnapshot(snapshot=>{
    userList.innerHTML="";
    snapshot.docs.forEach(doc=>{
      const user=doc.data();
      const div=document.createElement("div");
      div.className="user-item"+(user.status==="afk"?" afk":"");
      div.innerText=user.username;
      const status=document.createElement("span"); status.innerText=user.status==="afk"?"AFK":user.status==="offline"?"Offline":"Online";
      div.appendChild(status); userList.appendChild(div);
    });
  });
}

function setAFK(){
  if(!username) return;
  db.collection("users").where("username","==",username).get().then(snap=>{
    if(!snap.empty) db.collection("users").doc(snap.docs[0].id).update({status:"afk"});
  });
}

function setOnline(){
  if(!username) return;
  db.collection("users").where("username","==",username).get().then(snap=>{
    if(!snap.empty) db.collection("users").doc(snap.docs[0].id).update({status:"online"});
  });
}

window.addEventListener("blur",()=>{setAFK();});
window.addEventListener("focus",()=>{setOnline();});
</script>
</body>
</html>
