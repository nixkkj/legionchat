<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Legion Chat</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{
background:linear-gradient(135deg,#0a0a0f,#1a0033);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.login{
width:350px;
background:rgba(20,0,40,0.9);
padding:30px;
border-radius:20px;
}

.login input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#1f1f2e;
color:white;
}

.btn{
padding:10px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#7b00ff,#c000ff);
color:white;
cursor:pointer;
font-weight:bold;
}

.main{
display:none;
width:1200px;
height:80vh;
gap:20px;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
background:rgba(20,0,40,0.9);
border-radius:20px;
}

.header{
background:linear-gradient(90deg,#6a00ff,#9d00ff);
padding:10px;
display:flex;
justify-content:space-between;
border-radius:20px 20px 0 0;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
max-width:70%;
padding:10px;
border-radius:15px;
position:relative;
}

.sent{
align-self:flex-end;
background:#7b00ff;
}

.received{
align-self:flex-start;
background:#2a2a2a;
}

.input{
display:flex;
padding:10px;
}

.input input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#1f1f2e;
color:white;
}

.side{
width:260px;
display:flex;
flex-direction:column;
gap:10px;
}

.box{
background:rgba(20,0,40,0.9);
border-radius:20px;
display:flex;
flex-direction:column;
height:33%;
}

.box-header{
background:linear-gradient(90deg,#6a00ff,#9d00ff);
padding:8px;
text-align:center;
border-radius:20px 20px 0 0;
}

.box-content{
flex:1;
overflow-y:auto;
padding:8px;
}

.item{
background:#2a2a2a;
padding:6px;
border-radius:8px;
margin-bottom:5px;
}

.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#7b00ff;
padding:12px 20px;
border-radius:10px;
display:none;
animation:fade 0.5s;
}

@keyframes fade{
from{opacity:0;top:0;}
to{opacity:1;top:20px;}
}
</style>
</head>

<body>

<div id="loginScreen" class="login">
<h2>Login</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button class="btn" onclick="login()">Entrar</button>
<button class="btn" onclick="register()">Criar Conta</button>
</div>

<div id="main" class="main">

<div class="chat">
<div class="header">
<span id="username"></span>
<div>
<button class="btn" onclick="location.href='admin.html'">Admin</button>
<button class="btn" onclick="logout()">Sair</button>
</div>
</div>

<div id="chatBox" class="chat-box"></div>
<div id="typing"></div>

<div class="input">
<input id="msg">
<button class="btn" onclick="send()">Enviar</button>
</div>
</div>

<div class="side">

<div class="box">
<div class="box-header">Usuários</div>
<div id="usersList" class="box-content"></div>
</div>

<div class="box">
<div class="box-header">Update Logs</div>
<div id="logsList" class="box-content"></div>
</div>

<div class="box">
<div class="box-header">Legion - Discord</div>
<div id="discordList" class="box-content"></div>
</div>

</div>

</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDDj9IeS53XEEv07dULX2-OWbVvQyQbf6Y",
  authDomain: "legion-chat-d69be.firebaseapp.com",
  projectId: "legion-chat-d69be",
  storageBucket: "legion-chat-d69be.firebasestorage.app",
  messagingSenderId: "880449921734",
  appId: "1:880449921734:web:cdf622d2af44cb6ae8adc7",
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

let username="";
let typingTimeout;

function showToast(msg){
toast.innerText=msg;
toast.style.display="block";
setTimeout(()=>toast.style.display="none",3000);
}

async function saveUserIP(uid){
const res=await fetch("https://api.ipify.org?format=json");
const data=await res.json();
const ip=data.ip;

let doc=await db.collection("users").doc(uid).get();
let ips=doc.data().ips||[];

if(!ips.includes(ip))ips.push(ip);

await db.collection("users").doc(uid).update({ip,ips});
}

function register(){
let u=user.value.trim();
let p=pass.value.trim();

auth.createUserWithEmailAndPassword(u+"@x.com",p)
.then(async r=>{
await db.collection("users").doc(r.user.uid).set({
username:u,status:"online",role:"user",ips:[]
});
await saveUserIP(r.user.uid);
showToast("Conta criada");
});
}

function login(){
let u=user.value.trim();
let p=pass.value.trim();

auth.signInWithEmailAndPassword(u+"@x.com",p)
.then(async r=>{
await saveUserIP(r.user.uid);

let doc=await db.collection("users").doc(r.user.uid).get();
username=doc.data().username;

loginScreen.style.display="none";
main.style.display="flex";

start();
})
.catch(()=>showToast("Erro login"));
}

function logout(){
auth.signOut().then(()=>location.reload());
}

function send(){
let text=msg.value.trim();
if(!text)return;

db.collection("messages").add({
user:username,text,time:Date.now()
});

msg.value="";
}

function start(){
loadChat();
loadUsers();
loadLogs();
loadDiscord();
monitorTyping();
listenToast();
}

function loadChat(){
db.collection("messages").orderBy("time")
.onSnapshot(s=>{
chatBox.innerHTML="";
s.forEach(d=>{
let m=d.data();
let div=document.createElement("div");
div.className="message "+(m.user===username?"sent":"received");
div.innerText=m.user+": "+m.text;
chatBox.appendChild(div);
});
});
}

function loadUsers(){
db.collection("users").onSnapshot(s=>{
usersList.innerHTML="";
s.forEach(d=>{
let u=d.data();
usersList.innerHTML+=`<div class="item">${u.username}</div>`;
});
});
}

function loadLogs(){
db.collection("updateLogs").onSnapshot(s=>{
logsList.innerHTML="";
s.forEach(d=>{
let l=d.data();
logsList.innerHTML+=`<div class="item"><b>Patch ${l.date}</b><br>${l.changes.join("<br>")}</div>`;
});
});
}

function loadDiscord(){
discordList.innerHTML=`
<div class="item" onclick="window.open('https://discord.gg/jhFuJYhvHz')">
Entrar no Discord
</div>`;
}

msg.addEventListener("input",()=>{
if(!auth.currentUser)return;

db.collection("typing").doc(auth.currentUser.uid).set({user:username});

clearTimeout(typingTimeout);
typingTimeout=setTimeout(()=>{
db.collection("typing").doc(auth.currentUser.uid).delete();
},1500);
});

function monitorTyping(){
db.collection("typing").onSnapshot(s=>{
typing.innerText="";
s.forEach(d=>{
let t=d.data();
if(t.user!==username){
typing.innerText=t.user+" está digitando...";
}
});
});
}

function listenToast(){
db.collection("announcements").onSnapshot(s=>{
s.docChanges().forEach(change=>{
if(change.type==="added"){
showToast(change.doc.data().text);
}
});
});
}
</script>

</body>
</html>
